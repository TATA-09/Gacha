<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盲盒商店</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --secret-gradient: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            --smooth-btn: #1a1a1a;
            --disabled: #333333;
            --input-bg: #111111;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* 導航 */
        nav {
            padding: 15px;
            text-align: center;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 1px solid #111;
        }

        .energy-status { font-size: 0.85rem; color: #aaa; }
        #energy-count { color: #fff; font-weight: bold; font-size: 1.1rem; }

        .nav-btn {
            background: var(--smooth-btn);
            border: none;
            color: #666;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }

        .nav-btn.active { background: #fff; color: #000; font-weight: bold; }

        /* 搜尋與分類區域 */
        .filter-section {
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: var(--input-bg);
            border: 1px solid #222;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
            margin-bottom: 15px;
        }

        .category-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none; /* Firefox */
        }
        .category-bar::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .cat-btn {
            background: #111;
            border: 1px solid #222;
            color: #888;
            padding: 6px 15px;
            border-radius: 8px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .cat-btn.active {
            border-color: #fff;
            color: #fff;
            background: #222;
        }

        .container { width: 90%; max-width: 1100px; margin: 40px auto; }

        /* 修正封面圖拉長問題 */
        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .shelf-item {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .shelf-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
        }

        .buy-btn {
            width: 100%; padding: 15px; margin-top: 20px;
            background: #fff; color: #000; border: none;
            border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        .buy-btn:disabled { background: var(--disabled); color: #555; cursor: not-allowed; }

        /* 3D 舞台區域（省略重複的 CSS） */
        #gacha-stage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: 2000; perspective: 1200px; flex-direction: column; justify-content: center; align-items: center; gap: 40px; }
        .result-container { position: relative; width: 300px; height: 450px; display: flex; justify-content: center; align-items: center; }
        .box-3d { width: 160px; height: 220px; position: relative; transform-style: preserve-3d; transform: rotateY(-20deg) rotateX(10deg); }
        .face { position: absolute; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1); backface-visibility: hidden; }
        .face-front { width: 160px; height: 220px; transform: translateZ(30px); }
        .face-back { width: 160px; height: 220px; transform: rotateY(180deg) translateZ(30px); filter: brightness(0.4); }
        .face-right { width: 60px; height: 220px; transform: rotateY(90deg) translateZ(130px); filter: brightness(0.3); }
        .face-left { width: 60px; height: 220px; transform: rotateY(-90deg) translateZ(30px); filter: brightness(0.3); }
        .face-top { width: 160px; height: 60px; transform: rotateX(90deg) translateZ(30px); filter: brightness(0.6); }
        .face-bottom { width: 160px; height: 60px; transform: rotateX(-90deg) translateZ(190px); filter: brightness(0.2); }
        .box-animate { animation: boxSpin 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes boxSpin { 0% { transform: rotateY(-20deg) rotateX(10deg); } 50% { transform: rotateY(180deg) rotateX(-5deg) translateY(-15px); } 100% { transform: rotateY(340deg) rotateX(10deg); } }
        .box-burst .face { opacity: 0; transition: 0.4s; transform: scale(0.5); }
        .card-final { width: 300px; height: 450px; background: #000; border-radius: 20px; display: none; flex-direction: column; padding: 10px; transform: scale(0); box-shadow: 0 0 60px rgba(0,0,0,1); border: 2px solid #222; }
        .card-final.show { display: flex; animation: cardPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes cardPop { to { transform: scale(1); } }
        .card-final.secret { border: none; background: var(--secret-gradient); background-size: 400%; animation: steam 10s linear infinite; }
        .img-wrapper { width: 100%; height: 75%; background: #0a0a0a; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        #action-area { display: none; }
        .collect-btn-styled { background: #fff; color: #000; border: none; padding: 16px 60px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: transform 0.2s; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 40px;}
        .mini-card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .mini-card .img-container { width: 100%; height: 160px; background: #0a0a0a; overflow: hidden; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .mini-card.owned img { display: block; }
        .mini-card.owned .placeholder { display: none; }
        .placeholder { height: 100%; width: 100%; background: #0a0a0a; display: flex; align-items: center; justify-content: center; color: #222; font-size: 2.5rem; font-weight: bold; }
        @keyframes steam { 0% { background-position: 0% 0%; } 100% { background-position: 400% 0%; } }
    </style>
</head>
<body>

<nav>
    <div class="energy-status">次數: <span id="energy-count">10</span>/10 <span id="energy-timer" style="margin-left:10px; font-size: 0.75rem; color: #555;">(MAX)</span></div>
    <div>
        <button id="nav-shop" class="nav-btn active" onclick="switchTab('shop')">商店</button>
        <button id="nav-col" class="nav-btn" onclick="switchTab('col')">圖鑑</button>
    </div>
</nav>

<div class="container">
    <section id="shop-view">
        <div class="filter-section">
            <input type="text" id="shop-search" class="search-input" placeholder="搜尋盲盒系列名稱..." oninput="renderShop()">
            <div class="category-bar" id="category-bar">
                </div>
        </div>
        <div class="shelf-grid" id="shelf"></div>
    </section>

    <section id="col-view" style="display:none;">
        <div class="filter-section">
            <input type="text" id="col-search" class="search-input" placeholder="搜尋角色/卡片名稱..." oninput="renderCollection()">
        </div>
        <div id="col-list"></div>
    </section>
</div>

<div id="gacha-stage">
    <div class="result-container">
        <div class="box-3d" id="target-box">
            <div class="face face-front"></div><div class="face face-back"></div><div class="face face-left"></div><div class="face face-right"></div><div class="face face-top"></div><div class="face face-bottom"></div>
        </div>
        <div class="card-final" id="result-card">
            <div style="background:#000; height:100%; width:100%; border-radius:14px; overflow:hidden;">
                <div class="img-wrapper"><img class="card-img" id="result-img" src=""></div>
                <div style="height:25%; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                    <div id="result-rarity" style="font-size:0.7rem; font-weight:bold; letter-spacing: 2px;"></div>
                    <div id="result-name" style="font-size:1.4rem; font-weight:900;"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="action-area"><button class="collect-btn-styled" onclick="closeStage()">收入圖鑑</button></div>
</div>

    let currentCategory = "全部";
    let energy = parseInt(localStorage.getItem('energy')) || 10;
    let lastTime = parseInt(localStorage.getItem('lastTime')) || Date.now();
    const MAX_ENERGY = 10;
    const REFILL_SECONDS = 60;
    const STORAGE_KEY = 'blindbox_inventory_v2';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    // 1. 初始化分類按鈕
    function initCategoryBar() {
        const bar = document.getElementById('category-bar');
        const categories = ["全部", ...new Set(Object.values(DATA).map(item => item.category))];
        
        bar.innerHTML = categories.map(cat => `
            <button class="cat-btn ${cat === currentCategory ? 'active' : ''}" 
                    onclick="filterCategory('${cat}')">${cat}</button>
        `).join('');
    }

    function filterCategory(cat) {
        currentCategory = cat;
        initCategoryBar(); // 刷新按鈕狀態
        renderShop();      // 刷新列表
    }

    // 2. 渲染商店 (結合分類與搜尋)
    function renderShop() {
        const shelf = document.getElementById('shelf');
        const searchTerm = document.getElementById('shop-search').value.toLowerCase();
        shelf.innerHTML = "";
        
        Object.keys(DATA).forEach(sName => {
            const series = DATA[sName];
            const matchSearch = sName.toLowerCase().includes(searchTerm);
            const matchCat = currentCategory === "全部" || series.category === currentCategory;

            if (matchSearch && matchCat) {
                shelf.innerHTML += `
                    <div class="shelf-item">
                        <img src="${series.cover}" alt="${sName}">
                        <div style="margin-top:15px;">
                            <span style="font-size:0.7rem; background:#333; padding:2px 8px; border-radius:4px; color:#aaa;">${series.category}</span>
                        </div>
                        <h3 style="margin:10px 0 5px 0;">${sName}</h3>
                        <p style="color:#444; font-size:0.75rem;">隱藏款機率: ${series.secretProb}%</p>
                        <button class="buy-btn" onclick="startGacha('${sName}')">抽取盲盒</button>
                    </div>
                `;
            }
        });
        if (shelf.innerHTML === "") shelf.innerHTML = `<p style="text-align:center; color:#555; grid-column:1/-1;">找不到相關系列...</p>`;
    }

    // 3. 其他原有功能 (圖鑑渲染、抽卡邏輯等保持不變)
    function renderCollection() {
        const list = document.getElementById('col-list');
        const searchTerm = document.getElementById('col-search').value.toLowerCase();
        list.innerHTML = "";
        Object.keys(DATA).forEach(sName => {
            const filteredItems = DATA[sName].items.filter(item => item.name.toLowerCase().includes(searchTerm));
            if (filteredItems.length > 0) {
                let html = `<h2 style="color:#eee; margin-top:50px; border-left:4px solid #fff; padding-left:15px; font-size:1.2rem;">${sName}</h2><div class="gallery-grid">`;
                filteredItems.forEach(item => {
                    const invKey = `${sName}_${item.name}`;
                    const count = inventory[invKey] || 0;
                    const isOwned = count > 0;
                    html += `
                        <div class="mini-card ${isOwned ? 'owned' : ''} ${item.type}">
                            <div class="img-container"><div class="placeholder">?</div><img src="${item.img}"></div>
                            <div style="padding:15px;">
                                <div style="font-size:0.85rem; font-weight:bold; color:${isOwned?'#fff':'#444'}">${isOwned ? item.name : '尚未獲得'}</div>
                                <div style="font-size:0.7rem; color:#666; margin-top:5px;">持有: ${count}</div>
                            </div>
                        </div>`;
                });
                list.innerHTML += html + `</div>`;
            }
        });
    }

    // 輔助功能
    function updateEnergySystem() {
        const now = Date.now();
        if (energy < MAX_ENERGY) {
            const refillCount = Math.floor((now - lastTime) / 1000 / REFILL_SECONDS);
            if (refillCount > 0) {
                energy = Math.min(MAX_ENERGY, energy + refillCount);
                lastTime += refillCount * REFILL_SECONDS * 1000;
            }
        } else { lastTime = now; }
        document.getElementById('energy-count').innerText = energy;
        const remaining = REFILL_SECONDS - Math.floor((now - lastTime) / 1000) % REFILL_SECONDS;
        document.getElementById('energy-timer').innerText = energy >= MAX_ENERGY ? "(MAX)" : `(${remaining}s 回復)`;
        document.querySelectorAll('.buy-btn').forEach(btn => btn.disabled = energy < 1);
        localStorage.setItem('energy', energy); localStorage.setItem('lastTime', lastTime);
    }
    setInterval(updateEnergySystem, 1000);

    function startGacha(sName) {
        if (energy < 1) return;
        energy--; updateEnergySystem();
        const stage = document.getElementById('gacha-stage');
        const box = document.getElementById('target-box');
        const resCard = document.getElementById('result-card');
        document.getElementById('result-img').src = "";
        document.querySelectorAll('.face').forEach(f => f.style.backgroundImage = `url('${DATA[sName].cover}')`);
        stage.style.display = 'flex'; box.style.display = 'block'; box.classList.add('box-animate'); box.classList.remove('box-burst'); resCard.style.display = 'none';
        setTimeout(() => {
            const s = DATA[sName];
            const isSecret = (Math.random() * 100) < s.secretProb;
            const pool = s.items.filter(i => i.type === (isSecret ? "secret" : "common"));
            const result = pool[Math.floor(Math.random() * pool.length)];
            const invKey = `${sName}_${result.name}`;
            inventory[invKey] = (inventory[invKey] || 0) + 1;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
            box.classList.remove('box-animate'); box.classList.add('box-burst');
            setTimeout(() => {
                box.style.display = 'none'; resCard.style.display = 'flex'; resCard.className = `card-final show ${result.type}`;
                document.getElementById('result-img').src = result.img;
                document.getElementById('result-rarity').innerText = result.type.toUpperCase();
                document.getElementById('result-rarity').style.color = result.type === 'secret' ? '#ff00c8' : '#555';
                document.getElementById('result-name').innerText = result.name;
                document.getElementById('action-area').style.display = 'block';
            }, 500);
        }, 1800);
    }

    function closeStage() { document.getElementById('gacha-stage').style.display = 'none'; }
    function switchTab(tab) {
        document.getElementById('shop-view').style.display = tab === 'shop' ? 'block' : 'none';
        document.getElementById('col-view').style.display = tab === 'col' ? 'block' : 'none';
        document.getElementById('nav-shop').classList.toggle('active', tab === 'shop');
        document.getElementById('nav-col').classList.toggle('active', tab === 'col');
        if(tab === 'col') renderCollection(); else renderShop();
    }

    // 初始化
    initCategoryBar();
    renderShop();
</script>
</body>
</html>
