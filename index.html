<!DOCTYPE html>
<html lang="zh-TW" data-theme="unicorn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盲盒商店</title>
    <style>
        /* ================= 核心主題定義 ================= */
        /* 獨角獸夢幻主題 (預設) */
        [data-theme="unicorn"] {
            --bg: #f3effa;
            --body-bg-gradient: linear-gradient(135deg, #f5f3ff 0%, #fce7f3 100%);
            --container-bg: #ffffff;
            --text-main: #4338ca;
            --text-muted: #9333ea;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --nav-border: #f3e8ff;
            
            --accent: #f472b6;
            --uni-purple: #c084fc;
            --uni-blue: #818cf8;
            --uni-mint: #a7f3d0;
            --uni-yellow: #fef08a;
            
            --smooth-btn: #fae8ff;
            --nav-btn-text: #9333ea;
            --nav-btn-active-bg: linear-gradient(135deg, #f472b6 0%, #c084fc 100%);
            --nav-btn-active-text: #ffffff;
            --nav-btn-shadow: 0 4px 12px rgba(244, 114, 182, 0.4);
            
            --disabled: #f3f4f6;
            --input-bg: #f5f3ff;
            --input-border: #e9d5ff;
            
            --shelf-item-shadow: 0 10px 25px rgba(147, 51, 234, 0.05);
            --shelf-item-border: rgba(233, 213, 255, 0.4);
            --buy-btn-bg: linear-gradient(135deg, #c084fc 0%, #f472b6 100%);
            --buy-btn-text: #ffffff;
            --buy-btn-shadow: 0 4px 12px rgba(192, 132, 252, 0.4);

            --gacha-bg: radial-gradient(circle at center, #ffffff 0%, #f5f3ff 100%);
            --face-border: rgba(192, 132, 252, 0.2);
            --face-brightness-back: brightness(0.9);
            --face-brightness-side: brightness(0.85);
            --face-brightness-top: brightness(0.95);
            --face-brightness-bottom: brightness(0.8);
            
            --card-final-bg: #ffffff;
            --card-final-border: 1px solid #e9d5ff;
            --card-final-shadow: 0 15px 40px rgba(147,51,234,0.1);
            --card-secret-bg: #faf5ff;
            --card-conic-gradient: conic-gradient(#f472b6, #c084fc, #818cf8, #a7f3d0, #fef08a, #f472b6);
            
            --mini-card-bg: #ffffff;
            --mini-card-border: #e9d5ff;
            --img-wrapper-bg: #f5f3ff;
            --placeholder-color: #e9d5ff;
            --series-title-border: #c084fc;
        }

        /* 黑色風格主題 */
        [data-theme="dark"] {
            --bg: #050505;
            --body-bg-gradient: linear-gradient(0deg, #050505 0%, #050505 100%);
            --container-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --nav-bg: rgba(5, 5, 5, 0.9);
            --nav-border: #111111;
            
            --accent: #ffffff;
            --smooth-btn: #1a1a1a;
            --nav-btn-text: #666666;
            --nav-btn-active-bg: #ffffff;
            --nav-btn-active-text: #000000;
            --nav-btn-shadow: none;
            
            --disabled: #333333;
            --input-bg: #111111;
            --input-border: #222222;
            
            --shelf-item-shadow: none;
            --shelf-item-border: transparent;
            --buy-btn-bg: linear-gradient(0deg, #ffffff 0%, #ffffff 100%);
            --buy-btn-text: #000000;
            --buy-btn-shadow: none;

            --gacha-bg: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            --face-border: rgba(255, 255, 255, 0.1);
            --face-brightness-back: brightness(0.4);
            --face-brightness-side: brightness(0.3);
            --face-brightness-top: brightness(0.6);
            --face-brightness-bottom: brightness(0.2);
            
            --card-final-bg: #111111;
            --card-final-border: transparent;
            --card-final-shadow: 0 0 60px rgba(0,0,0,1);
            --card-secret-bg: #111111;
            --card-conic-gradient: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            
            --mini-card-bg: #111111;
            --mini-card-border: #222222;
            --img-wrapper-bg: #0a0a0a;
            --placeholder-color: #222222;
            --series-title-border: #ffffff;
        }

        /* ================= 通用樣式佈局 ================= */
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--body-bg-gradient);
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* 導航 */
        nav {
            padding: 15px;
            text-align: center;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 1px solid var(--nav-border);
            transition: background 0.3s, border-color 0.3s;
        }

        .energy-status { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        #energy-count { color: var(--accent); font-weight: bold; font-size: 1.1rem; }

        .nav-btn {
            background: var(--smooth-btn);
            border: 1px solid transparent;
            color: var(--nav-btn-text);
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: bold;
        }

        .nav-btn.active { 
            background: var(--nav-btn-active-bg); 
            color: var(--nav-btn-active-text); 
            font-weight: bold;
            box-shadow: var(--nav-btn-shadow);
        }

        /* 主題切換按鈕專屬樣式 */
        .theme-toggle-btn {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            color: #fff;
            border: transparent;
            box-shadow: 0 4px 10px rgba(129, 140, 248, 0.3);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        [data-theme="dark"] .theme-toggle-btn {
            background: linear-gradient(135deg, #333 0%, #000 100%);
            color: #fff;
            border: 1px solid #444;
            box-shadow: none;
        }

        /* 搜尋與分類區域 */
        .filter-section { margin-bottom: 25px; }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        .search-input:focus {
            border-color: var(--accent);
            background: var(--container-bg);
            box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.2);
        }

        .category-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: var(--container-bg);
            border: 1px solid var(--input-border);
            color: var(--text-muted);
            padding: 6px 15px;
            border-radius: 8px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            font-weight: 500;
        }
        .cat-btn.active {
            border-color: transparent;
            color: #ffffff;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(129, 140, 248, 0.3);
        }

        .container { width: 90%; max-width: 1100px; margin: 40px auto; }

        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .shelf-item {
            background: var(--container-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shelf-item-shadow);
            border: 1px solid var(--shelf-item-border);
            transition: 0.3s;
        }

        .shelf-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
        }

        .buy-btn {
            width: 100%; padding: 15px; margin-top: 20px;
            background: var(--buy-btn-bg); 
            color: var(--buy-btn-text); 
            border: none;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--buy-btn-shadow);
        }
        .buy-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        .buy-btn:disabled { background: var(--disabled); color: #555; cursor: not-allowed; box-shadow: none; transform: none; }
        [data-theme="unicorn"] .buy-btn:disabled { color: #a1a1a6; }

        /* 3D 舞台區域 */
		#gacha-stage { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--gacha-bg); z-index: 2000; perspective: 1200px; 
            flex-direction: column; justify-content: center; align-items: center; gap: 40px; 
            transition: background 0.3s;
        }
        .result-container { position: relative; width: 300px; height: 450px; display: flex; justify-content: center; align-items: center; }
        
        .box-3d { width: 160px; height: 220px; position: relative; transform-style: preserve-3d; transform: rotateY(20deg) rotateX(10deg); }
        
        .face { 
			position: absolute; 
			background-size: cover; 
			background-position: center; 
			border: 1px solid var(--face-border); 
			backface-visibility: hidden; 
			border-radius: 8px; 
			box-sizing: border-box; 
			background-repeat: no-repeat;
		}
        
        .face-front  { width: 160px; height: 220px; transform: translateZ(30px); filter: brightness(1); }
		.face-back   { width: 160px; height: 220px; transform: rotateY(180deg) translateZ(30px); filter: brightness(0.65); }
		.face-right  { width: 60px; height: 220px; transform: rotateY(90deg) translateZ(130px); filter: brightness(0.65); }
		.face-left   { width: 60px; height: 220px; transform: rotateY(-90deg) translateZ(30px); filter: brightness(0.65); }
		.face-top    { width: 160px; height: 60px; transform: rotateX(90deg) translateZ(30px); filter: brightness(0.65); }
		.face-bottom { width: 160px; height: 60px; transform: rotateX(-90deg) translateZ(190px); filter: brightness(0.65); }
        
        .box-animate { animation: boxSpin 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes boxSpin { 0% { transform: rotateY(-20deg) rotateX(10deg); } 50% { transform: rotateY(180deg) rotateX(-5deg) translateY(-15px); } 100% { transform: rotateY(340deg) rotateX(10deg); } }
        .box-burst .face { opacity: 0; transition: 0.4s; transform: scale(0.5); }
        
        .card-final { 
            width: 300px; height: 450px; border-radius: 20px; 
            display: none; flex-direction: column; 
            transform: scale(0); box-shadow: var(--card-final-shadow);
            position: relative; overflow: hidden;
            background: var(--card-final-bg); 
            padding: 4px; 
            border: var(--card-final-border);
            box-sizing: border-box;
        }
        
        /* 隱藏款流光效果 */
        .card-final.secret {
            background: var(--card-secret-bg);
            border: none;
        }
        .card-final.secret::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: var(--card-conic-gradient);
            animation: rotateStreamer 4s linear infinite;
            z-index: 0;
        }
        @keyframes rotateStreamer {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-final.show { display: flex; animation: cardPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes cardPop { to { transform: scale(1); } }
        
        .img-wrapper { width: 100%; height: 75%; background: var(--img-wrapper-bg); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        #action-area { display: none; z-index: 2; }
        
        .collect-btn-styled { 
            background: var(--buy-btn-bg); 
            color: var(--buy-btn-text); 
            border: none; padding: 16px 60px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: transform 0.2s; 
            box-shadow: var(--buy-btn-shadow);
        }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 40px;}
        
        .mini-card { background: var(--mini-card-bg); border-radius: 15px; overflow: hidden; border: 1px solid var(--mini-card-border); text-align: center; transition: 0.3s; }
        .mini-card .img-container { width: 100%; height: 160px; background: var(--img-wrapper-bg); overflow: hidden; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .mini-card.owned img { display: block; }
        .mini-card.owned .placeholder { display: none; }
        .placeholder { height: 100%; width: 100%; background: var(--img-wrapper-bg); display: flex; align-items: center; justify-content: center; color: var(--placeholder-color); font-size: 2.5rem; font-weight: bold; }
        
        /* 查無圖鑑時的提示樣式 */
        .empty-notice { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 1.1rem; font-weight: 500; }

        /* ================= 分頁元件樣式 ================= */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 40px 0;
        }
        .page-btn {
            background: var(--container-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            min-width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .page-btn.active {
            background: var(--nav-btn-active-bg);
            color: var(--nav-btn-active-text);
            border-color: transparent;
            box-shadow: var(--nav-btn-shadow);
        }
        .page-btn:disabled {
            background: var(--disabled);
            color: #ccc;
            cursor: not-allowed;
            border-color: transparent;
        }
        [data-theme="dark"] .page-btn:disabled {
            color: #444;
        }
    </style>
</head>

                { name: "西知識甲", type: "common", img: "https://lh3.googleusercontent.com/d/1Hbs_pSsDLvJzhtd6WW0_M1SRw2An9kgh" },
                { name: "呷梨", type: "common", img: "https://lh3.googleusercontent.com/d/1J-hY-23GSk6qEWMR0cL15twZ8aMVVwCf" },
                { name: "夜海鳴甲", type: "common", img: "https://lh3.googleusercontent.com/d/1k9cotn_B8S3pWiAQLG-Wq8HXzBnSW02c" },
                { name: "念甲甲", type: "common", img: "https://lh3.googleusercontent.com/d/1t-FPhQpZ6bbJBUHJbsnHNxh99ru8pU0b" },
                { name: "梅甲瓜報社", type: "common", img: "https://lh3.googleusercontent.com/d/1Re1Abq52KL0TW8Ime39I0t8Ym_-hOse2" },

                { name: "Hakulama甲甲", type: "common", img: "https://lh3.googleusercontent.com/d/1nGVS2m6TE4P_LXUcxbj2r2bLQIsfcQ0c" }
            ]
        },
        
        "吉伊卡哇-便當系列": {
            category: "吉伊卡哇",
            cover: "https://i.meee.com.tw/ehh9g7s.jpg",
            secretProb: 0,
            items: [
                { name: "吉伊飯團", type: "common", img: "https://i.meee.com.tw/vIMb7jd.jpg" },
                { name: "小八香腸", type: "common", img: "https://i.meee.com.tw/4QeArI5.jpg" },
                { name: "烏薩奇天婦羅", type: "common", img: "https://i.meee.com.tw/SiU1HRL.jpg" },
                { name: "小桃花椰菜", type: "common", img: "https://i.meee.com.tw/8ig1nZy.jpg" },
                { name: "栗子饅頭蘆筍", type: "common", img: "https://i.meee.com.tw/ntxEhk6.jpg" },
                { name: "海獺炸牡蠣", type: "common", img: "https://i.meee.com.tw/dNoAjgP.jpg" },
                { name: "獅薩玉子燒", type: "common", img: "https://i.meee.com.tw/HG3CqTP.jpg" }
            ]
        },
        
        "吉伊卡哇-台灣夜市": {
            category: "吉伊卡哇",
            cover: "https://i.meee.com.tw/tCRyCqf.jpg",
            secretProb: 0,
            items: [
                { name: "吉伊滷肉飯", type: "common", img: "https://i.meee.com.tw/U577Cn6.jpg" },
                { name: "小八地瓜球", type: "common", img: "https://i.meee.com.tw/ewzpsHm.jpg" },
                { name: "烏薩奇珍珠奶茶", type: "common", img: "https://i.meee.com.tw/ytznvBs.jpg" },
                { name: "小桃芋圓豆花", type: "common", img: "https://i.meee.com.tw/xN5pmdN.jpg" },
                { name: "獅薩鹽酥大雞塊", type: "common", img: "https://i.meee.com.tw/FxFVo4x.jpg" },
                { name: "栗子饅頭蚵仔麵線", type: "common", img: "https://i.meee.com.tw/cUOWi2C.jpg" },
                { name: "海獺雪花冰", type: "common", img: "https://i.meee.com.tw/XLnbi05.jpg" },
                { name: "古本屋刈包", type: "common", img: "https://i.meee.com.tw/5AxFzON.jpg" }
            ]
        }
    };

    // ================= 動態計算每頁顯示數量 =================
    let currentTab = 'shop'; // 追蹤當前分頁
    let shopCurrentPage = 1;
    let colCurrentPage = 1;

    // 計算當前版面適合放置多少項目的函式
    function calculateItemsPerPage(gridId) {
        const grid = document.getElementById(gridId);
        if (!grid) return 6; // 預設安全值

        // 取得格線容器的當前實際寬度
        const containerWidth = grid.clientWidth; 
        
        // 根據 CSS: minmax(280px, 1fr) 與 gap: 30px 計算一列可容納幾個
        const minCardWidth = 280;
        const gap = 30;
        
        // 一行可容納欄數
        let cols = Math.floor((containerWidth + gap) / (minCardWidth + gap));
        cols = Math.max(1, cols); // 至少 1 行

        // 設定補滿版面的行數 (例如：自動排滿 2 行作為一頁)
        const targetRows = 2; 
        return cols * targetRows;
    }

    let currentCategory = "全部";
    let storedEnergy = localStorage.getItem('energy');
    let energy = (storedEnergy === null) ? 10 : parseInt(storedEnergy);
    let lastTime = parseInt(localStorage.getItem('lastTime')) || Date.now();
    const MAX_ENERGY = 10;
    const REFILL_SECONDS = 60;
    const STORAGE_KEY = 'blindbox_inventory_v3';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    // ================= 主題切換邏輯 =================
    let currentTheme = localStorage.getItem('theme') || 'unicorn';
    document.documentElement.setAttribute('data-theme', currentTheme);

    function toggleTheme() {
        currentTheme = (currentTheme === 'unicorn') ? 'dark' : 'unicorn';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
    }

    // ================= 分頁重置邏輯 =================
    function resetShopPage() { shopCurrentPage = 1; }
    function resetColPage() { colCurrentPage = 1; }

    // ================= 核心渲染與抽獎系統 =================
    function initCategoryBar() {
        const bar = document.getElementById('category-bar');
        const categories = ["全部", ...new Set(Object.values(DATA).map(item => item.category))];
        bar.innerHTML = categories.map(cat => `<button class="cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</button>`).join('');
    }

    function filterCategory(cat) {
        currentCategory = cat;
        resetShopPage();
        initCategoryBar();
        renderShop();
    }

    // 渲染通用分頁控制列
    function renderPaginationUI(elementId, totalItems, currentPage, itemsPerPage, onPageChange) {
        const container = document.getElementById(elementId);
        container.innerHTML = "";
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        
        if (totalPages <= 1) return; // 只有一頁時不顯示分頁鈕

        // 上一頁
        container.innerHTML += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="${onPageChange}(${currentPage - 1})">«</button>`;
        
        // 頁碼
        for (let i = 1; i <= totalPages; i++) {
            container.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${onPageChange}(${i})">${i}</button>`;
        }

        // 下一頁
        container.innerHTML += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="${onPageChange}(${currentPage + 1})">»</button>`;
    }

    function changeShopPage(page) {
        shopCurrentPage = page;
        renderShop();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderShop() {
        const shelf = document.getElementById('shelf');
        const searchTerm = document.getElementById('shop-search').value.toLowerCase();
        shelf.innerHTML = "";

        // 1. 先過濾出符合條件的系列清單
        const filteredSeriesKeys = Object.keys(DATA).filter(sName => {
            const series = DATA[sName];
            return (currentCategory === "全部" || series.category === currentCategory) && sName.toLowerCase().includes(searchTerm);
        });

        // 動態計算目前滿版所需要的每頁數量
        const itemsPerPage = calculateItemsPerPage('shelf');

        // 2. 計算分頁範圍
        const startIndex = (shopCurrentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageSeriesKeys = filteredSeriesKeys.slice(startIndex, endIndex);

        // 3. 渲染當前頁面的項目
        pageSeriesKeys.forEach(sName => {
            const series = DATA[sName];
            shelf.innerHTML += `
                <div class="shelf-item">
                    <img src="${series.cover}" alt="${sName}">
                    <div style="margin-top:15px;"><span style="font-size:0.7rem; background: var(--smooth-btn); padding:4px 8px; border-radius:4px; color: var(--text-muted); font-weight:bold;">${series.category}</span></div>
                    <h3 style="margin:10px 0 5px 0;">${sName}</h3>
                    <p style="color: var(--text-muted); font-size:0.75rem;">隱藏款機率: ${series.secretProb}%</p>
                    <button class="buy-btn" onclick="startGacha('${sName}')">抽取盲盒</button>
                </div>`;
        });

        // 4. 渲染商店分頁鈕
        renderPaginationUI('shop-pagination', filteredSeriesKeys.length, shopCurrentPage, itemsPerPage, 'changeShopPage');
    }

    function changeColPage(page) {
        colCurrentPage = page;
        renderCollection();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderCollection() {
        const list = document.getElementById('col-list');
        const searchTerm = document.getElementById('col-search').value.toLowerCase();
        list.innerHTML = "";

        // 1. 先篩選出符合條件（且使用者「已至少擁有一張」）的系列
        const validSeriesKeys = Object.keys(DATA).filter(sName => {
            const hasAnyOwned = DATA[sName].items.some(item => {
                const invKey = `${sName}_${item.name}`;
                return (inventory[invKey] || 0) > 0;
            });

            if (!hasAnyOwned) return false;

            // 如果搜尋關鍵字包含在系列名稱內，整個系列直接判定符合
            if (sName.toLowerCase().includes(searchTerm)) {
                return true;
            }

            // 否則，才去檢查系列內有沒有任何卡片符合搜尋名稱
            const filteredItems = DATA[sName].items.filter(item => item.name.toLowerCase().includes(searchTerm));
            return filteredItems.length > 0;
        });

        // 圖鑑部分使用固定的設定或者也可以和商店分頁相同，此處改為同步動態一頁系列數量
        const itemsPerPage = calculateItemsPerPage('shelf'); 

        // 2. 計算圖鑑分頁範圍
        const startIndex = (colCurrentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageSeriesKeys = validSeriesKeys.slice(startIndex, endIndex);

        // 3. 渲染當前頁面的圖鑑系列
        pageSeriesKeys.forEach(sName => {
            //如果不是因為系列名稱匹配成功，才對卡片名稱做單獨過濾
            let filteredItems = DATA[sName].items;
            if (!sName.toLowerCase().includes(searchTerm)) {
                filteredItems = DATA[sName].items.filter(item => item.name.toLowerCase().includes(searchTerm));
            }
            
            let html = `<h2 style="color: var(--text-main); margin-top:50px; border-left:4px solid var(--series-title-border); padding-left:15px; font-size:1.2rem;">${sName}</h2><div class="gallery-grid">`;
            filteredItems.forEach(item => {
                const invKey = `${sName}_${item.name}`;
                const count = inventory[invKey] || 0;
                const isOwned = count > 0;
                html += `
                    <div class="mini-card ${isOwned ? 'owned' : ''}">
                        <div class="img-container"><div class="placeholder">?</div><img src="${item.img}"></div>
                        <div style="padding:15px;">
                            <div style="font-size:0.85rem; font-weight:bold; color:${isOwned?'var(--text-main)':'var(--placeholder-color)'}">${isOwned ? item.name : '尚未獲得'}</div>
                            <div style="font-size:0.7rem; color: var(--text-muted); margin-top:5px;">持有: ${count}</div>
                        </div>
                    </div>`;
            });
            list.innerHTML += html + `</div>`;
        });

        if (validSeriesKeys.length === 0) {
            list.innerHTML = `<div class="empty-notice">你的圖鑑空空如也，快去商店抽取第一個盲盒來解鎖吧！</div>`;
        }

        // 5. 渲染圖鑑分頁鈕
        renderPaginationUI('col-pagination', validSeriesKeys.length, colCurrentPage, itemsPerPage, 'changeColPage');
    }

    function updateEnergySystem() {
        const now = Date.now();
        if (energy < MAX_ENERGY) {
            const refillCount = Math.floor((now - lastTime) / 1000 / REFILL_SECONDS);
            if (refillCount > 0) {
                energy = Math.min(MAX_ENERGY, energy + refillCount);
                lastTime += refillCount * REFILL_SECONDS * 1000;
            }
        } else { lastTime = now; }
        document.getElementById('energy-count').innerText = energy;
        const remaining = REFILL_SECONDS - Math.floor((now - lastTime) / 1000) % REFILL_SECONDS;
        document.getElementById('energy-timer').innerText = energy >= MAX_ENERGY ? "(MAX)" : `(${remaining}s)`;
        
        localStorage.setItem('energy', energy);
        localStorage.setItem('lastTime', lastTime);
        
        const buyButtons = document.querySelectorAll('.buy-btn');
        buyButtons.forEach(btn => {
            btn.disabled = energy <= 0;
        });
    }

    function switchTab(tab) {
        currentTab = tab; // 記錄當前頁面
        if (tab === 'shop') {
            document.getElementById('shop-view').style.display = 'block';
            document.getElementById('col-view').style.display = 'none';
            document.getElementById('nav-shop').classList.add('active');
            document.getElementById('nav-col').classList.remove('active');
            renderShop();
        } else {
            document.getElementById('shop-view').style.display = 'none';
            document.getElementById('col-view').style.display = 'block';
            document.getElementById('nav-shop').classList.remove('active');
            document.getElementById('nav-col').classList.add('active');
            renderCollection();
        }
    }

    function startGacha(seriesName) {
        if (energy <= 0) return;
        energy--;
        document.getElementById('energy-count').innerText = energy;
        localStorage.setItem('energy', energy);
        
        const series = DATA[seriesName];
        const isSecret = (Math.random() * 100) <= series.secretProb;
        const pool = series.items.filter(item => isSecret ? item.type === 'secret' : item.type === 'common');
        const finalPool = pool.length > 0 ? pool : series.items;
        const reward = finalPool[Math.floor(Math.random() * finalPool.length)];

        const invKey = `${seriesName}_${reward.name}`;
        inventory[invKey] = (inventory[invKey] || 0) + 1;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));

		// 同時將中獎卡片資訊與該盲盒的封面圖 (series.cover) 傳過去
        showGachaAnimation(reward, series.cover);
    }

    
    function showGachaAnimation(reward, seriesCover) {
        const stage = document.getElementById('gacha-stage');
        const box = document.getElementById('target-box');
        const card = document.getElementById('result-card');
        const action = document.getElementById('action-area');
		
        // 動態將系列的封面圖網址，同步填入到 3D 盒子的每一個面
		const allFaces = box.querySelectorAll('.face');
		allFaces.forEach(face => {
			face.style.backgroundImage = `url('${seriesCover}')`;
		});
        
        card.className = "card-final" + (reward.type === 'secret' ? ' secret' : '');
        document.getElementById('result-img').src = reward.img;
        document.getElementById('result-rarity').innerText = reward.type === 'secret' ? 'SECRET' : 'COMMON';
        document.getElementById('result-rarity').style.color = reward.type === 'secret' ? '#f472b6' : '#9333ea';
        document.getElementById('result-name').innerText = reward.name;

        stage.style.display = 'flex';
        box.style.display = 'block';
        box.className = "box-3d box-animate"; // 重置並啟動精準轉一圈動畫
        card.style.display = 'none';
        action.style.display = 'none';

        // 1200ms 正好配合轉完一圈的時間點觸發爆開效果
        setTimeout(() => {
            box.className = "box-3d box-burst";
            setTimeout(() => {
                box.style.display = 'none';
                card.style.display = 'flex';
                card.classList.add('show');
                action.style.display = 'block';
            }, 400);
        }, 600);
    }

    function closeStage() {
        document.getElementById('gacha-stage').style.display = 'none';
        if(document.getElementById('col-view').style.display === 'block') {
            renderCollection();
        }
    }

    // 監聽視窗縮放事件，在縮放時重新計算排版與分頁
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            if (currentTab === 'shop') {
                renderShop();
            } else {
                renderCollection();
            }
        }, 200); // 加上防抖(Debounce)優化效能
    });

    // INIT
    initCategoryBar();
    renderShop();
    setInterval(updateEnergySystem, 1000);
    updateEnergySystem();
</script>
